name: Deploy Vendedoria to Render

on:
  push:
    branches:
      - master
      - claude/whatsapp-ai-crm-hYSVU
    paths:
      - "vendedoria/**"
      - ".github/workflows/deploy-vendedoria.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./vendedoria
          file: ./vendedoria/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vendedoria:latest
            ghcr.io/${{ github.repository_owner }}/vendedoria:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering Render deploy for commit ${{ github.sha }}..."
          HTTP_CODE=$(curl -s -o /tmp/render_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          echo "HTTP $HTTP_CODE"
          cat /tmp/render_resp.json || true

          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Deploy trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Render returns 202 with empty body when accepted — poll latest deploy
          sleep 10
          for i in $(seq 1 40); do
            S=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
              | jq -r '.[0].deploy.status // "unknown"')
            echo "[$i] $S"
            if [ "$S" = "live" ]; then echo "Deploy succeeded"; exit 0; fi
            if [ "$S" = "build_failed" ] || [ "$S" = "update_failed" ] || [ "$S" = "deactivated" ]; then
              echo "Deploy failed: $S"; exit 1
            fi
            sleep 25
          done
          echo "Deploy timed out after ~17 minutes"
          exit 1
