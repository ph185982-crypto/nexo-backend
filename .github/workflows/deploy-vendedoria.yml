name: Deploy Vendedoria to Render

on:
  push:
    branches:
      - claude/whatsapp-ai-crm-hYSVU
    paths:
      - "vendedoria/**"
      - ".github/workflows/deploy-vendedoria.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./vendedoria
          file: ./vendedoria/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vendedoria:latest
            ghcr.io/${{ github.repository_owner }}/vendedoria:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering Render deploy for commit ${{ github.sha }}..."
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{}')
          echo "$RESP"
          STATUS=$(echo "$RESP" | jq -r '.status // .message')
          echo "Deploy status: $STATUS"
          # Poll until live or failed (max 15 min)
          DEPLOY_ID=$(echo "$RESP" | jq -r '.id')
          if [ "$DEPLOY_ID" == "null" ]; then
            echo "Deploy trigger failed — check pipeline minutes quota on Render"
            exit 1
          fi
          for i in $(seq 1 30); do
            sleep 30
            S=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status')
            echo "[$i] $S"
            if [ "$S" = "live" ]; then echo "Deploy succeeded"; exit 0; fi
            if [ "$S" = "build_failed" ] || [ "$S" = "update_failed" ]; then echo "Deploy failed"; exit 1; fi
          done
          echo "Deploy timed out"
          exit 1
