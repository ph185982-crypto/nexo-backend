name: Deploy VPS
on:
  push:
    branches:
      - claude/whatsapp-ai-crm-hYSVU
    paths:
      - 'vps-status/deploy-trigger.txt'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Verificar secret VPS_PASS
        env:
          VPS_PASS: ${{ secrets.VPS_PASS }}
        run: |
          if [ -z "$VPS_PASS" ]; then
            echo "::error::Secret VPS_PASS não configurado. Adicione em Settings > Secrets and variables > Actions > New repository secret (nome: VPS_PASS)."
            exit 1
          fi

      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Disparar setup na VPS em background
        env:
          VPS_PASS: ${{ secrets.VPS_PASS }}
        run: |
          sshpass -p "$VPS_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@187.127.43.82 \
            'nohup bash <(curl -fsSL https://raw.githubusercontent.com/ph185982-crypto/nexo-backend/claude/whatsapp-ai-crm-hYSVU/vps-setup.sh) > /root/setup.log 2>&1 &
            echo "Setup iniciado na VPS - PID $!"'
