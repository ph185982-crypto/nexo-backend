name: Configurar RAPIDAPI_KEY e Deploy na VPS
on:
  workflow_dispatch:
    inputs:
      vps_pass:
        description: 'Senha SSH da VPS'
        required: true
      rapidapi_key:
        description: 'Valor da RAPIDAPI_KEY'
        required: true
      hotdeploy:
        description: 'Fazer git pull + npm build + pm2 restart? (true/false)'
        required: false
        default: 'true'

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Configurar RAPIDAPI_KEY e fazer deploy
        env:
          VPS_PASS: ${{ inputs.vps_pass }}
          RAPIDAPI_KEY: ${{ inputs.rapidapi_key }}
          HOTDEPLOY: ${{ inputs.hotdeploy }}
        run: |
          sshpass -p "$VPS_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            root@187.127.43.82 \
            "set -e
            export NVM_DIR=\$HOME/.nvm
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"

            APP_DIR=\$(pm2 jlist 2>/dev/null | python3 -c \"
          import json,sys
          try:
            procs = json.load(sys.stdin)
            for p in procs:
              cwd = p.get('pm2_env',{}).get('pm_cwd','')
              if 'nexo' in cwd.lower() or 'vendedoria' in cwd.lower():
                print(cwd); break
          except: pass
          \" 2>/dev/null)
            [ -z \"\$APP_DIR\" ] && APP_DIR=/var/www/nexo-backend/vendedoria
            REPO_DIR=\$(dirname \"\$APP_DIR\")
            echo \"APP_DIR: \$APP_DIR\"
            echo \"REPO_DIR: \$REPO_DIR\"

            # 1. Adicionar RAPIDAPI_KEY ao .env
            sed -i '/^RAPIDAPI_KEY=/d' \"\$APP_DIR/.env\" 2>/dev/null || true
            echo 'RAPIDAPI_KEY=$RAPIDAPI_KEY' >> \"\$APP_DIR/.env\"
            echo '✓ RAPIDAPI_KEY adicionada ao .env'

            # 2. Hot deploy (git pull + build + restart)
            if [ '$HOTDEPLOY' = 'true' ]; then
              echo '--- Iniciando hot deploy ---'
              cd \"\$REPO_DIR\"
              git fetch origin claude/whatsapp-ai-crm-hYSVU
              git checkout claude/whatsapp-ai-crm-hYSVU
              git pull origin claude/whatsapp-ai-crm-hYSVU
              echo \"✓ git pull — commit: \$(git rev-parse --short HEAD)\"

              cd \"\$APP_DIR\"
              npm install 2>&1 | tail -5
              echo '✓ npm install'

              npm run build 2>&1 | tail -20
              echo '✓ npm build'
            fi

            # 3. Reiniciar PM2
            pm2 restart all --update-env
            echo '✓ PM2 reiniciado'
            pm2 status"
