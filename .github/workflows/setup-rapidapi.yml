name: Configurar RAPIDAPI_KEY na VPS
on:
  workflow_dispatch:
    inputs:
      vps_pass:
        description: 'Senha SSH da VPS'
        required: true
      rapidapi_key:
        description: 'Valor da RAPIDAPI_KEY'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Adicionar RAPIDAPI_KEY e reiniciar PM2
        env:
          VPS_PASS: ${{ inputs.vps_pass }}
          RAPIDAPI_KEY: ${{ inputs.rapidapi_key }}
        run: |
          sshpass -p "$VPS_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@187.127.43.82 \
            "APP_DIR=\$(pm2 jlist 2>/dev/null | python3 -c \"
          import json,sys
          try:
            procs = json.load(sys.stdin)
            for p in procs:
              cwd = p.get('pm2_env',{}).get('pm_cwd','')
              if 'nexo' in cwd.lower() or 'vendedoria' in cwd.lower():
                print(cwd); break
          except: pass
          \" 2>/dev/null)
          [ -z \"\$APP_DIR\" ] && APP_DIR=/var/www/nexo-backend/vendedoria
          echo \"APP_DIR: \$APP_DIR\"
          sed -i '/^RAPIDAPI_KEY=/d' \"\$APP_DIR/.env\" 2>/dev/null || true
          sed -i '/^RAPIDAPI_KEY=/d' \"\$APP_DIR/.env.local\" 2>/dev/null || true
          echo 'RAPIDAPI_KEY=$RAPIDAPI_KEY' >> \"\$APP_DIR/.env\"
          echo 'RAPIDAPI_KEY=$RAPIDAPI_KEY' >> \"\$APP_DIR/.env.local\"
          echo 'Chave adicionada'
          pm2 restart all --update-env && echo 'PM2 reiniciado' && pm2 status"
