name: Keep Render Awake

on:
  schedule:
    # Every 5 minutes — prevents Render free tier cold start
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping vendedoria keepalive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://vendedoria.onrender.com/api/keepalive)
          echo "Keepalive response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Service returned HTTP $STATUS"
            exit 1
          fi
