<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — Nexo Vendas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; }
    p  { color: #8b949e; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    button {
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Não foi possível conectar ao Nexo Vendas. Verifique sua conexão e tente novamente.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
