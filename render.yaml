##############################################################################
# Nexo Vendas — Render Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code
#
# Deploy steps:
#   1. Push to GitHub (master branch)
#   2. Render detecta automaticamente e faz o build via Docker
##############################################################################

services:
  # ── Web App (Next.js via Docker) ──────────────────────────────────────────
  - type: web
    name: vendedoria
    runtime: docker
    dockerfilePath: ./vendedoria/Dockerfile
    dockerContext: ./vendedoria
    plan: free
    healthCheckPath: /api/health
    envVars:
      # ── Database ─────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: vendedoria-db
          property: connectionString

      # ── Redis ────────────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false         # ex: redis://red-xxx:6379

      # ── NextAuth v5 ───────────────────────────────────────────────────────
      - key: NEXTAUTH_URL
        sync: false         # https://vendedoria.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_SECRET
        generateValue: true  # gerado automaticamente — não precisa copiar NEXTAUTH_SECRET
      - key: AUTH_TRUST_HOST
        value: "true"

      # ── App URL ──────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_APP_URL
        sync: false         # https://vendedoria.onrender.com
      - key: RENDER_EXTERNAL_URL
        sync: false         # https://vendedoria.onrender.com

      # ── WhatsApp Business API ─────────────────────────────────────────────
      - key: META_WHATSAPP_VERIFY_TOKEN
        value: vendedoria_webhook_2025
      - key: META_WHATSAPP_APP_SECRET
        sync: false
      - key: META_WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: META_WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: META_WHATSAPP_WABA_ID
        sync: false
      - key: OWNER_WHATSAPP_NUMBER
        sync: false         # ex: 5562984465388

      # ── AI Providers ─────────────────────────────────────────────────────
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # ── Cloudinary ────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Web Push (VAPID) ──────────────────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false         # mailto:contato@nexobrasil.com.br

      # ── Mercado Pago ──────────────────────────────────────────────────────
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_CLIENT_ID
        sync: false
      - key: MERCADO_PAGO_CLIENT_SECRET
        sync: false

      # ── Melhor Envio ──────────────────────────────────────────────────────
      - key: MELHOR_ENVIO_TOKEN
        sync: false
      - key: MELHOR_ENVIO_SANDBOX
        value: "false"
      - key: CEP_ORIGEM
        value: "74480120"

      # ── Cron Protection ───────────────────────────────────────────────────
      - key: CRON_SECRET
        generateValue: true

      # ── Node ─────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

  # ── Cron: Daily Summary (todo dia às 08h BRT / 11h UTC) ──────────────────
  - type: cron
    name: vendedoria-daily-summary
    runtime: node
    schedule: "0 11 * * *"
    buildCommand: "echo 'no build'"
    startCommand: >
      node -e "
        const https = require('https');
        const url = new URL(process.env.APP_URL + '/api/cron/daily-summary');
        const opts = { hostname: url.hostname, path: url.pathname, headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } };
        https.get(opts, r => { let d=''; r.on('data', c => d+=c); r.on('end', () => { console.log(r.statusCode, d); if (r.statusCode >= 400) process.exit(1); }); }).on('error', e => { console.error(e); process.exit(1); });
      "
    envVars:
      - key: APP_URL
        sync: false         # https://vendedoria.onrender.com
      - key: CRON_SECRET
        sync: false

  # ── Cron: Importar Produtos (segunda às 02h BRT / 05h UTC) ───────────────
  - type: cron
    name: vendedoria-importar-produtos
    runtime: node
    schedule: "0 5 * * 1"
    buildCommand: "echo 'no build'"
    startCommand: >
      node -e "
        const https = require('https');
        const url = new URL(process.env.APP_URL + '/api/cron/importar-produtos?secret=' + process.env.CRON_SECRET);
        https.get({ hostname: url.hostname, path: url.pathname + url.search }, r => { let d=''; r.on('data', c => d+=c); r.on('end', () => { console.log(r.statusCode, d); if (r.statusCode >= 400) process.exit(1); }); }).on('error', e => { console.error(e); process.exit(1); });
      "
    envVars:
      - key: APP_URL
        sync: false         # https://vendedoria.onrender.com
      - key: CRON_SECRET
        sync: false

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  - name: vendedoria-db
    plan: free
    databaseName: vendedoria
    user: vendedoria
